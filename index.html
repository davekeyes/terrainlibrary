<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terrain Library</title>
  <meta name="description" content="Browse 150+ terrain pieces, miniatures, maps and accessories for tabletop RPG — search and filter the collection.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://terrainlibrary.vercel.app">
  <meta property="og:title" content="Terrain Library">
  <meta property="og:description" content="Browse 150+ terrain pieces, miniatures, maps and accessories for tabletop RPG — search and filter the collection.">
  <meta property="og:image" content="https://terrainlibrary.vercel.app/assets/TL_social.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Terrain Library">
  <meta name="twitter:description" content="Browse 150+ terrain pieces, miniatures, maps and accessories for tabletop RPG — search and filter the collection.">
  <meta name="twitter:image" content="https://terrainlibrary.vercel.app/assets/TL_social.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Feijoa';
      src: url('assets/fonts/feijoa-bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Feijoa';
      src: url('assets/fonts/feijoa-display.woff2') format('woff2');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Feijoa';
      src: url('assets/fonts/feijoa-medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #272908;                       /* Earthy green — confirmed Figma */
      --surface: #1b1d06;                  /* Card/modal surface */
      --bar-bg: #191a0a;                   /* Filter bar + search — confirmed Figma */
      --text: #f0eee9;                     /* Cream — from Figma rgba pattern */
      --text-muted: rgba(240,238,233,0.5);
      --border: rgba(240,238,233,0.12);
      --border-mid: rgba(240,238,233,0.25);
      --cream-40: rgba(240,238,233,0.4);   /* Search border — confirmed Figma */
      --shadow-card: 0 1px 3px rgba(0,0,0,.35), 0 2px 10px rgba(0,0,0,.25);
      --shadow-modal: 0 8px 40px rgba(0,0,0,.65);
      --radius-card: 12px;
      --radius-pill: 100px;

      --c-terrain: #6fbf97;    --c-terrain-bg: rgba(46,106,74,0.25);
      --c-minis: #b89ddc;      --c-minis-bg: rgba(107,63,160,0.25);
      --c-books: #85b0e8;      --c-books-bg: rgba(37,99,168,0.25);
      --c-maps: #70c4bc;       --c-maps-bg: rgba(42,122,114,0.25);
      --c-misc: #c4956a;       --c-misc-bg: rgba(122,82,52,0.25);
    }

    body {
      font-family: 'Open Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ───────────────────────────────────── */
    .hero {
      align-items: center;
      background: linear-gradient(to bottom, #41440d 0%, #41440d 26%, #272908 100%);
      display: flex;
      flex-direction: column;
      gap: 48px;
      padding: 40px 100px 32px;
      text-align: center;
    }

    .hero-brand {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .brand {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand-emblem { height: 72px; width: 72px; }

    .brand-wordmark {
      color: var(--text);
      font-family: 'Feijoa', serif;
      font-feature-settings: 'liga' 1, 'dlig' 1, 'calt' 1, 'ss02' 1;
      font-size: 40px;
      font-weight: 700;
      line-height: 48px;
      white-space: nowrap;
    }

    .hero-tagline {
      color: var(--text);
      font-family: 'Feijoa', serif;
      font-feature-settings: 'liga' 1, 'dlig' 1, 'calt' 1;
      font-size: 64px;
      font-weight: 300;
      line-height: 72px;
      text-align: center;
    }

    @media (min-width: 1100px) {
      .hero-tagline { white-space: nowrap; }
    }

    .hero-controls {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 100%;
      width: max-content;
    }

    .hero-search-wrap {
      align-items: center;
      background: rgba(25,26,10,0.8);
      border: none;
      border-bottom: 1px solid rgba(240,238,233,0.3);
      border-radius: 16px;
      display: flex;
      gap: 14px;
      height: 56px;
      padding: 15px 28px 17px 24px;
      width: 100%;
    }

    .hero-search-icon {
      color: var(--text);
      flex-shrink: 0;
      height: 16px;
      opacity: 0.6;
      width: 16px;
    }

    #search {
      background: none;
      border: none;
      color: var(--text);
      flex: 1;
      font-family: 'Open Sans', system-ui, sans-serif;
      font-size: 20px;
      min-width: 0;
      outline: none;
      text-align: center;
    }
    #search::placeholder { color: rgba(240,238,233,0.6); }
    #search::-webkit-search-cancel-button { -webkit-appearance: none; }

    .search-clear {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      height: 16px;
      padding: 0;
      width: 16px;
    }
    .search-clear svg { display: block; height: 16px; width: 16px; }

    .filter-strip { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 8px; }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(240,238,233,0.3);
      border-radius: 16px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Open Sans', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 400;
      padding: 10px 16px;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { background: rgba(240,238,233,0.08); border-color: var(--cream-40); }
    .filter-btn.active {
      background: rgba(240,238,233,0.1);
      border-color: transparent;
      border-top: 1px solid rgba(240,238,233,0.3);
    }

    .header-count {
      color: rgba(255,255,255,0.6);
      font-family: 'Open Sans', system-ui, sans-serif;
      font-size: 16px;
      text-align: center;
    }

    .hero-star { height: auto; opacity: 0.65; width: 8px; }

    /* ── Results bar ────────────────────────────── */
    #results-bar { display: none; }

    /* ── Grid ───────────────────────────────────── */
    main {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin: 0 auto;
      max-width: 1400px;
      padding: 24px 24px 48px;
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      flex: 1 1 280px;
      max-width: 360px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow .15s, transform .15s, border-color .15s;
    }

    @media (hover: hover) {
      .card:hover {
        border-color: var(--border-mid);
        box-shadow: 0 4px 20px rgba(0,0,0,.45);
        transform: translateY(-2px);
      }
    }

    .card.hidden { display: none; }

    .card-play-icon {
      align-items: center;
      background: rgba(0,0,0,.5);
      border-radius: 50%;
      color: #fff;
      display: flex;
      height: 44px;
      justify-content: center;
      left: 50%;
      pointer-events: none;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
    }

    .card-photo {
      aspect-ratio: 16 / 10;
      background: #111205;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    .card-photo img {
      display: block;
      height: 100%;
      object-fit: cover;
      width: 100%;
      transition: opacity .2s;
    }

    .card-photo img.loading { opacity: 0; }

    .photo-count {
      background: rgba(0,0,0,.55);
      border-radius: var(--radius-pill);
      bottom: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 2px 8px;
      position: absolute;
      right: 8px;
    }

    .photo-ph {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      font-size: 14px;
      gap: 6px;
      height: 100%;
      justify-content: center;
      padding: 12px;
    }
    .photo-ph svg { opacity: .3; }
    .photo-ph span { opacity: .6; }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 7px;
      padding: 14px 16px 16px;
    }

    .card-meta { align-items: center; display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 8px; }

    .tl-id { color: var(--text-muted); font-family: 'Open Sans', system-ui, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: .5px; }

    .cat-pill {
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .3px;
      padding: 2px 8px;
      text-transform: uppercase;
    }
    .cat-Terrain    { background: var(--c-terrain-bg); color: var(--c-terrain); }
    .cat-Miniatures { background: var(--c-minis-bg);   color: var(--c-minis); }
    .cat-Books      { background: var(--c-books-bg);   color: var(--c-books); }
    .cat-Maps       { background: var(--c-maps-bg);    color: var(--c-maps); }
    .cat-Misc       { background: var(--c-misc-bg);    color: var(--c-misc); }

    .card-sub { color: var(--text-muted); font-size: 14px; }
    .card-name { color: var(--text); font-family: 'Feijoa', serif; font-size: 18px; font-weight: 700; letter-spacing: -.1px; line-height: 1.3; }
    .card-desc {
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      color: rgba(240,238,233,0.75);
      display: -webkit-box;
      font-size: 16px;
      line-height: 24px;
      overflow: hidden;
    }

    /* ── Empty state ────────────────────────────── */
    #empty {
      display: none;
      grid-column: 1 / -1;
      padding: 80px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }
    #empty.visible { display: block; }

    /* ── Modal ──────────────────────────────────── */
    #modal-backdrop {
      background: rgba(0,0,0,.72);
      display: none;
      inset: 0;
      overflow-y: auto;
      padding: 32px 16px;
      position: fixed;
      z-index: 200;
    }
    #modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-modal);
      max-width: 860px;
      overflow: hidden;
      width: 100%;
    }

    .modal-photos { background: #0d0f03; }

    .modal-main-photo {
      aspect-ratio: 16 / 9;
      align-items: center;
      display: flex;
      justify-content: center;
      overflow: hidden;
      width: 100%;
    }

    .modal-main-photo img {
      display: block;
      height: 100%;
      object-fit: contain;
      width: 100%;
    }

    .modal-thumb-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 6px 8px;
      scrollbar-width: thin;
    }

    .modal-thumb {
      background: #1a1c06;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      height: 52px;
      object-fit: cover;
      opacity: .55;
      transition: opacity .15s, border-color .15s;
      width: 72px;
    }
    .modal-thumb.active, .modal-thumb:hover { opacity: 1; border-color: var(--cream-40); }

    .thumb-wrap { flex-shrink: 0; position: relative; }
    .thumb-wrap .modal-thumb { flex-shrink: 0; }
    .thumb-wrap--video::after {
      background: rgba(0,0,0,.45);
      border-radius: 4px;
      content: '';
      inset: 0;
      pointer-events: none;
      position: absolute;
    }
    .thumb-play {
      align-items: center;
      color: #fff;
      display: flex;
      inset: 0;
      justify-content: center;
      pointer-events: none;
      position: absolute;
      z-index: 1;
    }
    .modal-main-photo iframe {
      border: none;
      display: block;
      height: 100%;
      width: 100%;
    }

    .modal-body { padding: 24px 28px 32px; }

    .modal-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
    .modal-title-block { flex: 1; min-width: 0; }

    .modal-meta { align-items: center; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .modal-id { color: var(--text-muted); font-family: 'Open Sans', system-ui, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: .5px; }
    .modal-sub { color: var(--text-muted); font-size: 14px; }

    .modal-name { color: var(--text); font-family: 'Feijoa', serif; font-size: 40px; font-weight: 500; letter-spacing: -.3px; line-height: 48px; }

    .modal-close {
      background: rgba(240,238,233,0.08);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 22px;
      height: 36px;
      line-height: 36px;
      text-align: center;
      transition: background .15s, color .15s;
      width: 36px;
    }
    .modal-close:hover { background: rgba(240,238,233,0.15); color: var(--text); }

    .modal-details { display: flex; flex-direction: column; gap: 16px; }

    .detail-row { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { color: var(--text-muted); font-size: 14px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .detail-value { color: var(--text); font-size: 18px; line-height: 1.6; }

    .detail-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .modal-divider { border: none; border-top: 1px solid var(--border); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .tag {
      background: rgba(240,238,233,0.07);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-muted);
      font-size: 14px;
      padding: 2px 10px;
    }

    /* ── Mobile ─────────────────────────────────── */
    @media (max-width: 640px) {
      .hero { gap: 32px; padding: 40px 20px 64px; }
      .brand { width: auto; }
      main { gap: 14px; padding: 16px 16px 40px; }
      #search { font-size: 16px; }
      .filter-btn { font-size: 14px; padding: 8px 12px; }
      .modal-body { padding: 18px 18px 24px; }
      .modal-name { font-size: 28px; line-height: 36px; }
      .detail-pair { grid-template-columns: 1fr; }
    }

    @media (max-width: 380px) {
      .card { flex: 1 1 100%; max-width: 100%; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-brand">
    <div class="brand">
      <img class="brand-emblem" src="assets/logo-emblem.svg" alt="" width="72" height="72">
      <span class="brand-wordmark">Terrain Library</span>
    </div>
    <p class="hero-tagline">Set the table for adventure</p>
  </div>
  <div class="hero-controls">
    <div class="hero-search-wrap">
      <svg class="hero-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="5"/>
        <path d="m10.5 10.5 4 4" stroke-linecap="round"/>
      </svg>
      <input type="search" id="search" placeholder="Search for ...cavern, woods, bridge, traps..." autocomplete="off" spellcheck="false">
      <button class="search-clear" id="search-clear" aria-label="Clear search" hidden>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8"/>
        </svg>
      </button>
    </div>
    <div class="filter-strip">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="Terrain">Terrain</button>
      <button class="filter-btn" data-cat="Miniatures">Miniatures</button>
      <button class="filter-btn" data-cat="Maps &amp; Mats">Maps &amp; Mats</button>
      <button class="filter-btn" data-cat="Books">Books</button>
      <button class="filter-btn" data-cat="Misc">Misc</button>
    </div>
    <span class="header-count" id="header-count"></span>
  </div>
</section>

<div id="results-bar"></div>

<main id="grid">
  <div id="empty">Nothing found. Try a different search.</div>
</main>

<div style="text-align:center;padding:32px 0 48px"><img src="assets/star.png" alt="" width="8" style="opacity:.5"></div>

<div id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-name-el">
  <div id="modal">
    <div class="modal-photos" id="modal-photos-wrap">
      <div class="modal-main-photo" id="modal-main-photo"></div>
      <div class="modal-thumb-strip" id="modal-thumbs" style="display:none"></div>
    </div>
    <div class="modal-body">
      <div class="modal-header">
        <div class="modal-title-block">
          <div class="modal-meta" id="modal-meta"></div>
          <div class="modal-name" id="modal-name-el"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-details" id="modal-details"></div>
    </div>
  </div>
</div>

<script src="catalogue.js?v=2"></script>
<script>
// ── Photo helper ─────────────────────────────
function photoPH(label) {
  return '<div class="photo-ph">' +
    '<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>' +
    '<span>' + label + '</span></div>';
}

function getPhotos(item) {
  return (item.photos || []).map(function(p) { return photoUrl(p); }).filter(Boolean);
}
function getFullPhotos(item) {
  return (item.photos || []).map(function(p) { return photoUrl(p, "full"); }).filter(Boolean);
}

// ── Category class mapping ───────────────────
function catCls(cat) {
  return "cat-" + (cat === "Maps & Mats" ? "Maps" : cat);
}
function catLabel(cat) {
  return cat === "Maps & Mats" ? "Maps & Mats" : cat;
}

// ── Build card ───────────────────────────────
function buildCard(item) {
  var photos = getPhotos(item);
  var photoHtml;

  if (photos.length > 0) {
    var countBadge = photos.length > 1
      ? '<span class="photo-count">' + photos.length + ' photos</span>'
      : '';
    photoHtml = '<div class="card-photo">' +
      '<img src="' + photos[0] + '" alt="" class="loading"' +
      ' onload="this.classList.remove(\'loading\')"' +
      ' onerror="this.parentNode.innerHTML=photoPH(\'' + item.id + '\')">' +
      countBadge + '</div>';
  } else {
    var videoIds = (item.videos || []).map(ytId).filter(Boolean);
    if (videoIds.length > 0) {
      var playIcon = '<div class="card-play-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>';
      photoHtml = '<div class="card-photo">' +
        '<img src="' + ytThumb(videoIds[0]) + '" alt="" class="loading"' +
        ' onload="this.classList.remove(\'loading\')"' +
        ' onerror="this.parentNode.innerHTML=photoPH(\'' + item.id + '\')">' +
        playIcon + '</div>';
    } else {
      photoHtml = '<div class="card-photo">' + photoPH(item.id) + '</div>';
    }
  }

  return '<div class="card" data-id="' + item.id + '" tabindex="0" role="button" aria-label="' + item.name + '">' +
    photoHtml +
    '<div class="card-body">' +
      '<div class="card-name">' + item.name + '</div>' +
      '<div class="card-desc">' + item.desc + '</div>' +
      '<div class="card-meta">' +
        '<span class="tl-id">' + item.id + '</span>' +
        '<span class="cat-pill ' + catCls(item.cat) + '">' + catLabel(item.cat) + '</span>' +
        '<span class="card-sub">' + item.sub + '</span>' +
      '</div>' +
    '</div></div>';
}

// ── Render ───────────────────────────────────
var grid = document.getElementById('grid');
var emptyEl = document.getElementById('empty');

var cardsHtml = CATALOGUE.map(buildCard).join('');
grid.insertAdjacentHTML('afterbegin', cardsHtml);

updateCount(CATALOGUE.length);

// ── Filtering ─────────────────────────────────
var activeFilter = 'all';
var searchQuery = '';

function matches(item) {
  if (activeFilter !== 'all' && item.cat !== activeFilter) return false;
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    var hay = (item.name + ' ' + item.tags + ' ' + item.desc + ' ' + item.sub + ' ' + item.id).toLowerCase();
    if (hay.indexOf(q) === -1) return false;
  }
  return true;
}

function applyFilters() {
  var visible = 0;
  var cards = grid.querySelectorAll('.card');
  cards.forEach(function(card) {
    var item = CATALOGUE.find(function(i) { return i.id === card.dataset.id; });
    if (!item) return;
    var show = matches(item);
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  updateCount(visible);
  emptyEl.classList.toggle('visible', visible === 0);
}

function updateCount(n) {
  var total = CATALOGUE.length;
  document.getElementById('header-count').textContent =
    n === total ? total + ' items' : n + ' of ' + total + ' items';
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    applyFilters();
  });
});

var searchInput = document.getElementById('search');
var searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  searchClear.hidden = !e.target.value;
  applyFilters();
});

searchClear.addEventListener('click', function() {
  searchInput.value = '';
  searchQuery = '';
  searchClear.hidden = true;
  searchInput.focus();
  applyFilters();
});

// ── Card click → modal ────────────────────────
grid.addEventListener('click', function(e) {
  var card = e.target.closest('.card');
  if (card) openModal(card.dataset.id);
});
grid.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    var card = e.target.closest('.card');
    if (card) { e.preventDefault(); openModal(card.dataset.id); }
  }
});

// ── YouTube helpers ───────────────────────────
function ytId(url) {
  var m = url.match(/(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function ytThumb(id) {
  return 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';
}
function setMainVideo(id) {
  mainPhotoWrap.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id +
    '?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
}

// ── Modal ─────────────────────────────────────
var backdrop = document.getElementById('modal-backdrop');
var mainPhotoWrap = document.getElementById('modal-main-photo');
var thumbsEl = document.getElementById('modal-thumbs');
var modalMeta = document.getElementById('modal-meta');
var modalNameEl = document.getElementById('modal-name-el');
var modalDetails = document.getElementById('modal-details');

function setMainPhoto(src) {
  var img = new Image();
  img.alt = '';
  img.onerror = function() {
    mainPhotoWrap.innerHTML = '<div class="photo-ph" style="color:rgba(240,239,235,.4)">' +
      '<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
      '<path d="m21 15-5-5L5 21"/></svg><span>Photo not available</span></div>';
  };
  img.src = src;
  mainPhotoWrap.innerHTML = '';
  mainPhotoWrap.appendChild(img);
}

function openModal(id) {
  var item = CATALOGUE.find(function(i) { return i.id === id; });
  if (!item) return;

  var photos = getPhotos(item);
  var fullPhotos = getFullPhotos(item);

  // Photos + videos
  var videoIds = (item.videos || []).map(ytId).filter(Boolean);
  var totalMedia = photos.length + videoIds.length;

  if (totalMedia > 0) {
    if (photos.length > 0) setMainPhoto(fullPhotos[0]);
    else setMainVideo(videoIds[0]);

    if (totalMedia > 1) {
      var playIcon = '<div class="thumb-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>';
      thumbsEl.innerHTML =
        photos.map(function(p, i) {
          return '<div class="thumb-wrap"><img class="modal-thumb' + (i === 0 ? ' active' : '') + '"' +
            ' src="' + p + '" alt="" data-src="' + fullPhotos[i] + '"' +
            ' onerror="this.parentNode.style.display=\'none\'"></div>';
        }).join('') +
        videoIds.map(function(vid) {
          return '<div class="thumb-wrap thumb-wrap--video"><img class="modal-thumb"' +
            ' src="' + ytThumb(vid) + '" alt="Video" data-video="' + vid + '">' +
            playIcon + '</div>';
        }).join('');
      thumbsEl.style.display = '';
      thumbsEl.querySelectorAll('.modal-thumb').forEach(function(th) {
        th.addEventListener('click', function() {
          thumbsEl.querySelectorAll('.modal-thumb').forEach(function(t) { t.classList.remove('active'); });
          th.classList.add('active');
          if (th.dataset.video) setMainVideo(th.dataset.video);
          else setMainPhoto(th.dataset.src);
        });
      });
    } else {
      thumbsEl.style.display = 'none';
      thumbsEl.innerHTML = '';
    }
  } else {
    mainPhotoWrap.innerHTML = '<div class="photo-ph" style="color:rgba(240,239,235,.4)">' +
      '<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
      '<path d="m21 15-5-5L5 21"/></svg><span>Photo available locally</span>' +
      '<span style="font-size:11px;opacity:.5">' + item.id + '</span></div>';
    thumbsEl.style.display = 'none';
  }

  // Meta header
  modalMeta.innerHTML =
    '<span class="modal-id">' + item.id + '</span>' +
    '<span class="cat-pill ' + catCls(item.cat) + '">' + catLabel(item.cat) + '</span>' +
    '<span class="modal-sub">' + item.sub + '</span>';

  modalNameEl.textContent = item.name;

  // Details body
  var d = '';

  if (item.desc) {
    d += '<div class="detail-row"><div class="detail-label">Description</div>' +
      '<div class="detail-value">' + item.desc + '</div></div>';
  }

  if (item.notes_default) {
    d += '<div class="detail-row"><div class="detail-label">Notes</div>' +
      '<div class="detail-value">' + item.notes_default + '</div></div>';
  }

  var tags = item.tags ? item.tags.split(',').map(function(t){ return t.trim(); }).filter(Boolean) : [];
  if (tags.length) {
    d += '<div class="detail-row"><div class="detail-label">Tags</div><div class="tag-list">' +
      tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') +
      '</div></div>';
  }

  modalDetails.innerHTML = d;

  backdrop.classList.add('open');
  backdrop.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  mainPhotoWrap.innerHTML = '';
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
backdrop.addEventListener('click', function(e) { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
});
</script>
</body>
</html>
