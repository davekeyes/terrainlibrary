<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terrain Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --header-bg: #1a2018;
      --text: #1c2118;
      --text-muted: #6e6b64;
      --border: #e5e2db;
      --shadow-card: 0 1px 3px rgba(20,30,18,.07), 0 2px 10px rgba(20,30,18,.05);
      --shadow-modal: 0 8px 40px rgba(10,15,10,.35);
      --radius-card: 12px;
      --radius-pill: 100px;

      --c-terrain: #2e6a4a;   --c-terrain-bg: #e6f2ec;
      --c-minis: #6b3fa0;     --c-minis-bg: #f0ebf8;
      --c-books: #2563a8;     --c-books-bg: #e8f0fa;
      --c-maps: #2a7a72;      --c-maps-bg: #e5f3f1;
      --c-misc: #7a5234;      --c-misc-bg: #f3ede6;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--header-bg);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 0 12px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    h1 { font-size: 18px; font-weight: 700; color: #f0efeb; letter-spacing: -.2px; }

    .header-count { font-size: 13px; color: rgba(240,239,235,.45); flex: 1; }

    #search {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      color: #f0efeb;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      padding: 8px 14px;
      width: 240px;
      transition: background .15s, border-color .15s;
    }
    #search::placeholder { color: rgba(240,239,235,.4); }
    #search:focus { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.3); }

    .filter-strip { display: flex; gap: 6px; flex-wrap: wrap; }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius-pill);
      color: rgba(240,239,235,.65);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 14px;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { background: rgba(255,255,255,.1); color: #f0efeb; border-color: rgba(255,255,255,.35); }
    .filter-btn.active { background: #f0efeb; border-color: #f0efeb; color: var(--header-bg); font-weight: 600; }

    /* ── Results bar ────────────────────────── */
    #results-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px 24px 0;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 32px;
    }

    /* ── Grid ───────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    /* ── Card ───────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow .15s, transform .15s;
    }

    @media (hover: hover) {
      .card:hover {
        box-shadow: 0 4px 16px rgba(20,30,18,.12), 0 1px 4px rgba(20,30,18,.08);
        transform: translateY(-2px);
      }
    }

    .card.hidden { display: none; }

    .card-photo {
      aspect-ratio: 16 / 10;
      background: #e8e6e0;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    .card-photo img {
      display: block;
      height: 100%;
      object-fit: cover;
      width: 100%;
      transition: opacity .2s;
    }

    .card-photo img.loading { opacity: 0; }

    .photo-count {
      background: rgba(0,0,0,.45);
      border-radius: var(--radius-pill);
      bottom: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      position: absolute;
      right: 8px;
    }

    .photo-ph {
      align-items: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      font-size: 12px;
      gap: 6px;
      height: 100%;
      justify-content: center;
      padding: 12px;
    }
    .photo-ph svg { opacity: .3; }
    .photo-ph span { opacity: .6; }

    .card-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 7px;
      padding: 14px 16px 16px;
    }

    .card-meta { align-items: center; display: flex; gap: 6px; flex-wrap: wrap; }

    .tl-id { color: var(--text-muted); font-family: monospace; font-size: 11px; font-weight: 700; letter-spacing: .5px; }

    .cat-pill {
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .3px;
      padding: 2px 8px;
      text-transform: uppercase;
    }
    .cat-Terrain    { background: var(--c-terrain-bg); color: var(--c-terrain); }
    .cat-Miniatures { background: var(--c-minis-bg); color: var(--c-minis); }
    .cat-Books      { background: var(--c-books-bg); color: var(--c-books); }
    .cat-Maps       { background: var(--c-maps-bg); color: var(--c-maps); }
    .cat-Misc       { background: var(--c-misc-bg); color: var(--c-misc); }

    .card-sub { color: var(--text-muted); font-size: 12px; }
    .card-name { font-size: 15px; font-weight: 700; letter-spacing: -.1px; line-height: 1.3; }
    .card-scale-qty { color: var(--text-muted); font-size: 12px; }

    .card-desc {
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      color: var(--text);
      display: -webkit-box;
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    .card-tags {
      color: var(--text-muted);
      font-size: 11px;
      margin-top: auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Empty state ────────────────────────── */
    #empty {
      display: none;
      grid-column: 1 / -1;
      padding: 80px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }
    #empty.visible { display: block; }

    /* ── Modal ──────────────────────────────── */
    #modal-backdrop {
      background: rgba(10,15,10,.6);
      display: none;
      inset: 0;
      overflow-y: auto;
      padding: 32px 16px;
      position: fixed;
      z-index: 200;
    }
    #modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }

    #modal {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow-modal);
      max-width: 860px;
      width: 100%;
      overflow: hidden;
    }

    .modal-photos { background: #1a1e18; }

    .modal-main-photo {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-main-photo img {
      display: block;
      height: 100%;
      object-fit: contain;
      width: 100%;
    }

    .modal-thumb-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 6px 8px;
      scrollbar-width: thin;
    }

    .modal-thumb {
      background: #2a2e28;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      height: 52px;
      object-fit: cover;
      opacity: .6;
      transition: opacity .15s, border-color .15s;
      width: 72px;
    }
    .modal-thumb.active, .modal-thumb:hover { opacity: 1; border-color: rgba(240,239,235,.8); }

    .modal-body { padding: 24px 28px 32px; }

    .modal-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
    .modal-title-block { flex: 1; min-width: 0; }

    .modal-meta { align-items: center; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .modal-id { color: var(--text-muted); font-family: monospace; font-size: 12px; font-weight: 700; letter-spacing: .5px; }
    .modal-sub { color: var(--text-muted); font-size: 13px; }

    .modal-name { font-size: 22px; font-weight: 700; letter-spacing: -.3px; line-height: 1.25; }

    .modal-close {
      background: var(--bg);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 22px;
      height: 36px;
      line-height: 36px;
      text-align: center;
      transition: background .15s, color .15s;
      width: 36px;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-details { display: flex; flex-direction: column; gap: 16px; }

    .detail-row { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { color: var(--text-muted); font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .detail-value { font-size: 14px; line-height: 1.6; }

    .detail-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .modal-divider { border: none; border-top: 1px solid var(--border); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: 11px;
      padding: 2px 10px;
    }

    /* ── Mobile ─────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      main { padding: 12px 16px 40px; gap: 14px; grid-template-columns: 1fr 1fr; }
      #results-bar { padding: 10px 16px 0; }
      #search { width: 100%; }
      .modal-body { padding: 18px 18px 24px; }
      .modal-name { font-size: 18px; }
      .detail-pair { grid-template-columns: 1fr; }
    }

    @media (max-width: 380px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>Terrain Library</h1>
      <span class="header-count" id="header-count"></span>
      <input type="search" id="search" placeholder="Search items, tags, categories…" autocomplete="off" spellcheck="false">
    </div>
    <div class="filter-strip">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="Terrain">Terrain</button>
      <button class="filter-btn" data-cat="Miniatures">Miniatures</button>
      <button class="filter-btn" data-cat="Maps &amp; Mats">Maps &amp; Mats</button>
      <button class="filter-btn" data-cat="Books">Books</button>
      <button class="filter-btn" data-cat="Misc">Misc</button>
    </div>
  </div>
</header>

<div id="results-bar"></div>

<main id="grid">
  <div id="empty">Nothing found. Try a different search.</div>
</main>

<div id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-name-el">
  <div id="modal">
    <div class="modal-photos" id="modal-photos-wrap">
      <div class="modal-main-photo" id="modal-main-photo"></div>
      <div class="modal-thumb-strip" id="modal-thumbs" style="display:none"></div>
    </div>
    <div class="modal-body">
      <div class="modal-header">
        <div class="modal-title-block">
          <div class="modal-meta" id="modal-meta"></div>
          <div class="modal-name" id="modal-name-el"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-details" id="modal-details"></div>
    </div>
  </div>
</div>

<script src="catalogue.js?v=2"></script>
<script>
// ── Photo helper ─────────────────────────────
function photoPH(label) {
  return '<div class="photo-ph">' +
    '<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>' +
    '<span>' + label + '</span></div>';
}

function getPhotos(item) {
  return (item.photos || []).map(function(p) { return photoUrl(p); }).filter(Boolean);
}
function getFullPhotos(item) {
  return (item.photos || []).map(function(p) { return photoUrl(p, "full"); }).filter(Boolean);
}

// ── Category class mapping ───────────────────
function catCls(cat) {
  return "cat-" + (cat === "Maps & Mats" ? "Maps" : cat);
}
function catLabel(cat) {
  return cat === "Maps & Mats" ? "Maps & Mats" : cat;
}

// ── Build card ───────────────────────────────
function buildCard(item) {
  var photos = getPhotos(item);
  var photoHtml;

  if (photos.length > 0) {
    var countBadge = photos.length > 1
      ? '<span class="photo-count">' + photos.length + ' photos</span>'
      : '';
    photoHtml = '<div class="card-photo">' +
      '<img src="' + photos[0] + '" alt="" class="loading"' +
      ' onload="this.classList.remove(\'loading\')"' +
      ' onerror="this.parentNode.innerHTML=photoPH(\'' + item.id + '\')">' +
      countBadge + '</div>';
  } else {
    photoHtml = '<div class="card-photo">' + photoPH(item.id) + '</div>';
  }

  var tags = item.tags
    ? item.tags.split(',').slice(0, 4).map(function(t){ return t.trim(); }).filter(Boolean)
    : [];

  var scaleQty = '';
  if (item.scale && item.scale !== 'N/A') scaleQty += item.scale;
  if (item.qty) scaleQty += (scaleQty ? ' · ' : '') + item.qty;

  return '<div class="card" data-id="' + item.id + '" tabindex="0" role="button" aria-label="' + item.name + '">' +
    photoHtml +
    '<div class="card-body">' +
      '<div class="card-meta">' +
        '<span class="tl-id">' + item.id + '</span>' +
        '<span class="cat-pill ' + catCls(item.cat) + '">' + catLabel(item.cat) + '</span>' +
        '<span class="card-sub">' + item.sub + '</span>' +
      '</div>' +
      '<div class="card-name">' + item.name + '</div>' +
      (scaleQty ? '<div class="card-scale-qty">' + scaleQty + '</div>' : '') +
      '<div class="card-desc">' + item.desc + '</div>' +
      (tags.length ? '<div class="card-tags">' + tags.join(' · ') + '</div>' : '') +
    '</div></div>';
}

// ── Render ───────────────────────────────────
var grid = document.getElementById('grid');
var emptyEl = document.getElementById('empty');

var cardsHtml = CATALOGUE.map(buildCard).join('');
grid.insertAdjacentHTML('afterbegin', cardsHtml);

updateCount(CATALOGUE.length);

// ── Filtering ─────────────────────────────────
var activeFilter = 'all';
var searchQuery = '';

function matches(item) {
  if (activeFilter !== 'all' && item.cat !== activeFilter) return false;
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    var hay = (item.name + ' ' + item.tags + ' ' + item.desc + ' ' + item.sub + ' ' + item.id).toLowerCase();
    if (hay.indexOf(q) === -1) return false;
  }
  return true;
}

function applyFilters() {
  var visible = 0;
  var cards = grid.querySelectorAll('.card');
  cards.forEach(function(card) {
    var item = CATALOGUE.find(function(i) { return i.id === card.dataset.id; });
    if (!item) return;
    var show = matches(item);
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  updateCount(visible);
  emptyEl.classList.toggle('visible', visible === 0);
}

function updateCount(n) {
  var total = CATALOGUE.length;
  document.getElementById('header-count').textContent =
    n === total ? total + ' items' : n + ' of ' + total + ' items';
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  applyFilters();
});

// ── Card click → modal ────────────────────────
grid.addEventListener('click', function(e) {
  var card = e.target.closest('.card');
  if (card) openModal(card.dataset.id);
});
grid.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    var card = e.target.closest('.card');
    if (card) { e.preventDefault(); openModal(card.dataset.id); }
  }
});

// ── Modal ─────────────────────────────────────
var backdrop = document.getElementById('modal-backdrop');
var mainPhotoWrap = document.getElementById('modal-main-photo');
var thumbsEl = document.getElementById('modal-thumbs');
var modalMeta = document.getElementById('modal-meta');
var modalNameEl = document.getElementById('modal-name-el');
var modalDetails = document.getElementById('modal-details');

function setMainPhoto(src) {
  var img = new Image();
  img.alt = '';
  img.onerror = function() {
    mainPhotoWrap.innerHTML = '<div class="photo-ph" style="color:rgba(240,239,235,.4)">' +
      '<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
      '<path d="m21 15-5-5L5 21"/></svg><span>Photo not available</span></div>';
  };
  img.src = src;
  mainPhotoWrap.innerHTML = '';
  mainPhotoWrap.appendChild(img);
}

function openModal(id) {
  var item = CATALOGUE.find(function(i) { return i.id === id; });
  if (!item) return;

  var photos = getPhotos(item);
  var fullPhotos = getFullPhotos(item);

  // Photos
  if (photos.length > 0) {
    setMainPhoto(fullPhotos[0]);
    if (photos.length > 1) {
      thumbsEl.innerHTML = photos.map(function(p, i) {
        return '<img class="modal-thumb' + (i === 0 ? ' active' : '') + '"' +
          ' src="' + p + '" alt="" data-src="' + fullPhotos[i] + '"' +
          ' onerror="this.style.display=\'none\'">';
      }).join('');
      thumbsEl.style.display = '';
      thumbsEl.querySelectorAll('.modal-thumb').forEach(function(th) {
        th.addEventListener('click', function() {
          thumbsEl.querySelectorAll('.modal-thumb').forEach(function(t) { t.classList.remove('active'); });
          th.classList.add('active');
          setMainPhoto(th.dataset.src);
        });
      });
    } else {
      thumbsEl.style.display = 'none';
      thumbsEl.innerHTML = '';
    }
  } else {
    mainPhotoWrap.innerHTML = '<div class="photo-ph" style="color:rgba(240,239,235,.4)">' +
      '<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
      '<path d="m21 15-5-5L5 21"/></svg><span>Photo available locally</span>' +
      '<span style="font-size:11px;opacity:.5">' + item.id + '</span></div>';
    thumbsEl.style.display = 'none';
  }

  // Meta header
  modalMeta.innerHTML =
    '<span class="modal-id">' + item.id + '</span>' +
    '<span class="cat-pill ' + catCls(item.cat) + '">' + catLabel(item.cat) + '</span>' +
    '<span class="modal-sub">' + item.sub + '</span>';

  modalNameEl.textContent = item.name;

  // Details body
  var d = '';

  var hasScale = item.scale && item.scale !== 'N/A';
  var hasQty = !!item.qty;
  if (hasScale || hasQty) {
    d += '<div class="detail-pair">';
    if (hasScale) d += '<div class="detail-row"><div class="detail-label">Scale</div><div class="detail-value">' + item.scale + '</div></div>';
    if (hasQty)   d += '<div class="detail-row"><div class="detail-label">Quantity</div><div class="detail-value">' + item.qty + '</div></div>';
    d += '</div>';
  }

  if (item.desc) {
    d += '<hr class="modal-divider">' +
      '<div class="detail-row"><div class="detail-label">Description</div>' +
      '<div class="detail-value">' + item.desc + '</div></div>';
  }

  if (item.notes_default) {
    d += '<div class="detail-row"><div class="detail-label">Notes</div>' +
      '<div class="detail-value">' + item.notes_default + '</div></div>';
  }

  var tags = item.tags ? item.tags.split(',').map(function(t){ return t.trim(); }).filter(Boolean) : [];
  if (tags.length) {
    d += '<div class="detail-row"><div class="detail-label">Tags</div><div class="tag-list">' +
      tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') +
      '</div></div>';
  }

  modalDetails.innerHTML = d;

  backdrop.classList.add('open');
  backdrop.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
backdrop.addEventListener('click', function(e) { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
});
</script>
</body>
</html>
